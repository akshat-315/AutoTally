services:
  autotally:
    build: .
    container_name: autotally
    restart: unless-stopped
    expose:
      - "8001"
    env_file:
      - .env
    volumes:
      - ./data:/app/server/data
      - ./data/logs:/app/server/logs

  nginx:
    image: nginx:alpine
    container_name: autotally-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - autotally
